sonar.projectKey=trainersync
sonar.projectName=TrainerSync
sonar.sourceEncoding=UTF-8
# If using a local default SonarQube instance, use a generated token instead of plain-text credentials.
# The token may be passed via SONAR_TOKEN environment variable or sonar.token property.

sonar.sources=backend,frontend/src
sonar.tests=
sonar.python.version=3.12
sonar.scm.disabled=true

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.vite/**,**/__pycache__/**,**/.pytest_cache/**,**/.mypy_cache/**,**/.ruff_cache/**,**/.venv/**,**/venv/**,**/*.pyc,**/.env,**/.env.example,**/*.env,**/config/credentials.json,**/config/token.json,**/config/token*.bak
sonar.coverage.exclusions=**/*
sonar.cpd.exclusions=frontend/src/pages/Home.jsx,frontend/src/pages/Shortlist.jsx,frontend/src/pages/Shortlist1.jsx

# Project-level Sonar tuning:
# - React PropTypes are not used in this JavaScript/Vite codebase.
# - FastAPI HTTPException metadata is intentionally kept lightweight for internal APIs.
# - Home.jsx is a highly visual landing page with decorative repeated arrays and hover-only styling.
# - Legacy React pages intentionally keep dense JSX/control-flow until those workflows are redesigned.
