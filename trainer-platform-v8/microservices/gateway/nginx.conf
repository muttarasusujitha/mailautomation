##############################################################################
# TrainerSync – Microservices API Gateway (nginx)
# All public traffic enters on port 80 (→ 443 in production).
# Each /api/v1/<service>/* path is proxied to the corresponding container.
##############################################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream service blocks ──────────────────────────────────────────────
    upstream core_api {
        server core-api:8001;
        keepalive 32;
    }

    upstream email_service {
        server email-service:8002;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:8003;
        keepalive 32;
    }

    upstream trainer_service {
        server trainer-service:8004;
        keepalive 32;
    }

    upstream intelligence_service {
        server intelligence-service:8005;
        keepalive 32;
    }

    upstream document_service {
        server document-service:8006;
        keepalive 32;
    }

    upstream scheduler_service {
        server scheduler-service:8007;
        keepalive 32;
    }

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    # ── Helper: proxy headers ────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen       80;
        server_name  _;

        client_max_body_size 25M;

        # ── Health check (load-balancer probe) ────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── CORS pre-flight ──────────────────────────────────────────────────
        location / {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # ── Core API ──────────────────────────────────────────────────────────
        # Customers, Requirements, Journeys, Automations, Stats, Logs
        location /api/v1/customers {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/requirements {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/journeys {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/automations {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/stats {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/logs {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Email Service ─────────────────────────────────────────────────────
        location /api/v1/email {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://email_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Notification Service ──────────────────────────────────────────────
        location /api/v1/notifications {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://notification_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Trainer Service ───────────────────────────────────────────────────
        location /api/v1/trainers {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://trainer_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/trainer-slots {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://trainer_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/v1/toc {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://trainer_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Intelligence Service ──────────────────────────────────────────────
        location /api/v1/intelligence {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://intelligence_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Document Service ──────────────────────────────────────────────────
        # Resume upload uses a stricter rate limit
        location /api/v1/documents/resume/upload {
            limit_req zone=upload_limit burst=5 nodelay;
            proxy_pass         http://document_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            client_max_body_size 15M;
        }

        location /api/v1/documents {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://document_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Scheduler Service ─────────────────────────────────────────────────
        location /api/v1/scheduler {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://scheduler_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
