##############################################################################
# TrainerSync – Microservices API Gateway  (nginx 1.25)
#
# Port layout:
#   :80   → this gateway (→ :443 in production with TLS termination)
#   All upstream services are on the internal Docker network only.
#
# Service port map:
#   auth-service          :8008
#   core-api              :8001
#   email-service         :8002
#   notification-service  :8003
#   trainer-service       :8004
#   intelligence-service  :8005
#   document-service      :8006
#   scheduler-service     :8007
##############################################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver      127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size  30M;

    # ── Upstream blocks ────────────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:8008;
        keepalive 32;
    }
    upstream core_api {
        server core-api:8001;
        keepalive 32;
    }
    upstream email_service {
        server email-service:8002;
        keepalive 32;
    }
    upstream notification_service {
        server notification-service:8003;
        keepalive 32;
    }
    upstream trainer_service {
        server trainer-service:8004;
        keepalive 32;
    }
    upstream intelligence_service {
        server intelligence-service:8005;
        keepalive 32;
    }
    upstream document_service {
        server document-service:8006;
        keepalive 32;
    }
    upstream scheduler_service {
        server scheduler-service:8007;
        keepalive 32;
    }

    # ── Rate-limiting zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m   rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m       rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m  rate=300r/m;

    # ── Shared proxy-header macro ──────────────────────────────────────────────
    # (nginx doesn't support real macros; headers are repeated per block)

    server {
        listen 80;
        server_name _;

        # ── Infrastructure ──────────────────────────────────────────────────────

        location = /health {
            access_log off;
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        location = / {
            access_log off;
            return 302 http://localhost:5173/;
        }

        # Backward-compatible dev paths: the frontend still calls /api/... while
        # the microservices gateway routes are mounted under /api/v1/...
        location ~ ^/api/(?!v1/)(.*)$ {
            rewrite ^/api/(.*)$ /api/v1/$1 last;
        }

        location /api/ {
            return 404 '{"error":"Not found"}';
            add_header Content-Type application/json;
        }

        # Global CORS pre-flight
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept';
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
            return 302 http://localhost:5173$request_uri;
        }

        # ── AUTH SERVICE  :8008 ─────────────────────────────────────────────────
        # POST  /api/v1/auth/forgot-password
        # GET   /api/v1/admin/settings
        # POST  /api/v1/admin/settings
        # GET   /api/v1/admin/auto-send/diagnose
        # POST  /api/v1/admin/email/test
        # POST  /api/v1/admin/whatsapp/test
        # POST  /api/v1/admin/teams/test
        # POST  /api/v1/admin/teams-direct/test

        location /api/v1/auth {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/v1/admin {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── CORE API  :8001 ─────────────────────────────────────────────────────
        # GET/POST/PATCH/DELETE  /api/v1/customers
        # GET/POST/PATCH/DELETE  /api/v1/requirements
        # GET/POST/PATCH/DELETE  /api/v1/journeys
        # GET/POST/PATCH/DELETE  /api/v1/automations
        # GET                    /api/v1/stats/*
        # GET                    /api/v1/logs/*
        # GET                    /api/v1/dashboard/stats
        # GET                    /api/v1/dashboard/analytics
        # GET                    /api/v1/client-pipeline
        # DELETE                 /api/v1/database/clear

        location /api/v1/customers {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/requirements {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/journeys {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/automations {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/stats {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/logs {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/dashboard {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/client-pipeline {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/database {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── EMAIL SERVICE  :8002 ────────────────────────────────────────────────
        # POST   /api/v1/email/send   /api/v1/email/send/bulk
        # POST   /api/v1/email/inbox/poll*
        # GET    /api/v1/email/inbox/unprocessed
        # PATCH  /api/v1/inbox/{id}/mark-processed
        # POST   /api/v1/inbox/{id}/approve|reject|regenerate-reply
        # GET    /api/v1/emails   + actions (send-one, retry, schedule-interview…)
        # GET    /api/v1/gmail/*  (OAuth, sync, webhook)
        # GET    /api/v1/email-open/{id}
        # GET    /api/v1/client-conversations
        # GET+POST /api/v1/scheduler/config
        # GET+POST /api/v1/business-excel/*
        # GET+POST /api/v1/client-updates/*
        # POST   /api/v1/email/templates/*

        # Upload-specific rate limit for resume uploads (handled by document-service below)
        location /api/v1/email {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/emails {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/inbox {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/gmail {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/email-open {
            # tracking pixel — no rate limit needed
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }
        location /api/v1/client-conversations {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/scheduler {
            limit_req zone=api burst=10 nodelay;
            # /scheduler/config → email-service; /scheduler/tasks → scheduler-service
            # nginx longest-prefix match: the more specific location below wins for /tasks
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location /api/v1/scheduler/tasks {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://scheduler_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/business-excel {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/client-updates {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://email_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── NOTIFICATION SERVICE  :8003 ─────────────────────────────────────────
        # POST /api/v1/notifications/whatsapp/*
        # POST /api/v1/notifications/teams/*
        # POST /api/v1/whatsapp/*  (webhooks: inbound-callback, status-callback, meta/webhook)
        # GET  /api/v1/teams-direct/*  (OAuth URL, callback, send)

        location /api/v1/notifications {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://notification_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/whatsapp {
            # Webhooks from Twilio/Meta — high volume, relaxed rate limit
            limit_req zone=webhook burst=100 nodelay;
            proxy_pass http://notification_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location /api/v1/teams-direct {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://notification_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── TRAINER SERVICE  :8004 ──────────────────────────────────────────────
        # /api/v1/trainers/*
        # /api/v1/resume-uploads/*
        # /api/v1/resume-data/*
        # /api/v1/trainer-slots/*
        # /api/v1/shortlists/*
        # /api/v1/interview-reminders/*
        # /api/v1/toc/*
        # /api/v1/purchase-orders/*
        # /api/v1/invoices/*

        location /api/v1/trainers {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/resume-uploads {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 15M;
        }
        location /api/v1/resume-data {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/trainer-slots {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/shortlists {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/interview-reminders {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/interview-schedules {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/toc {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/purchase-orders {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/invoices {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://trainer_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── INTELLIGENCE SERVICE  :8005 ─────────────────────────────────────────
        # /api/v1/intelligence/*   (categorise, analyse-email, score-intent)
        # /api/v1/contact-finder/* (find, find/bulk, find-and-send-mail)
        # /api/v1/client-leads/*
        # /api/v1/trainer-profile-leads/*
        # /api/v1/ai/*             (analyze-reply, log-usage)
        # /api/v1/assistant/chat

        location /api/v1/intelligence {
            limit_req zone=ai burst=15 nodelay;
            proxy_pass http://intelligence_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/contact-finder {
            limit_req zone=ai burst=10 nodelay;
            proxy_pass http://intelligence_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/client-leads {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://intelligence_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/trainer-profile-leads {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://intelligence_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
        location /api/v1/ai {
            limit_req zone=ai burst=20 nodelay;
            proxy_pass http://intelligence_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
        location /api/v1/assistant {
            limit_req zone=ai burst=10 nodelay;
            proxy_pass http://intelligence_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── DOCUMENT SERVICE  :8006 ─────────────────────────────────────────────
        # POST /api/v1/documents/resume/upload  ← strict upload rate limit
        # GET  /api/v1/documents/resume/uploads
        # POST /api/v1/documents/pdf/*
        # GET  /api/v1/documents/excel/*
        # POST /api/v1/documents/excel/import

        location /api/v1/documents/resume/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://document_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 15M;
        }
        location /api/v1/documents {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://document_service;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── SCHEDULER SERVICE  :8007 ────────────────────────────────────────────
        # Already handled: /api/v1/scheduler/tasks  (more-specific prefix above)

        # ── Error pages ─────────────────────────────────────────────────────────
        error_page 502 503 504 @gateway_error;
        location @gateway_error {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable","status":503}';
        }
    }
}
